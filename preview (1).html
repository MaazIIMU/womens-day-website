<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>All Hail The Queen 👑</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

*{
box-sizing:border-box;
font-family:Poppins;
}

body{

margin:0;
min-height:100vh;

background:
radial-gradient(circle at 10% 20%, #ffd1e8 0%, transparent 30%),
radial-gradient(circle at 80% 70%, #ffc6a8 0%, transparent 30%),
linear-gradient(135deg,#ff9ecf,#ffd6a5);

display:flex;
align-items:center;
justify-content:center;

}

/* floating elements */

.float{

position:absolute;
font-size:24px;
opacity:.5;
animation:float 12s linear infinite;

}

@keyframes float{

0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}

}

.wrapper{

background:white;
border-radius:20px;
padding:40px;
width:90%;
max-width:1000px;

display:flex;
gap:40px;

box-shadow:0 20px 40px rgba(0,0,0,.15);

}

.left{flex:1}

.right{

flex:1;
display:flex;
align-items:center;
justify-content:center;

}

h1{

font-family:"Playfair Display";
color:#e91e63;

}

input{

width:100%;
padding:12px;
margin:10px 0;

border-radius:10px;
border:1px solid #ddd;

}

button{

background:#e91e63;
color:white;

border:none;
padding:12px 18px;
border-radius:10px;

cursor:pointer;
margin-top:10px;

}

button:hover{

background:#c2185b;

}

/* message card */

.card{

background:linear-gradient(135deg,#ffe0f0,#fff3d6);

border-radius:15px;

padding:25px;

font-size:18px;

line-height:1.6;

display:none;

max-width:400px;

}

.actions{

margin-top:15px;

display:flex;
gap:10px;
flex-wrap:wrap;

}

/* mobile popup */

.modal{

display:none;

position:fixed;
top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,.6);

align-items:center;
justify-content:center;

}

.modal-content{

background:white;
padding:25px;
border-radius:20px;

width:90%;
max-width:400px;

}

.close{

float:right;
cursor:pointer;

}

/* mobile */

@media(max-width:768px){

.wrapper{
flex-direction:column;
}

.right{
display:none;
}

}

</style>

</head>

<body>


<div class="wrapper">

<div class="left">

<h1>Women's Day Royal Decree 👑</h1>

<p>Reveal the royal proclamation</p>

<input id="name" placeholder="Name of the Empress 👑">
<input id="role" placeholder="Her Legendary Profession">

<button onclick="generate()">Reveal The Royal Message</button>

</div>


<div class="right">

<div id="card" class="card">

<div id="message"></div>

<div class="actions">

<button onclick="copyMsg()">Copy</button>
<button onclick="downloadCard()">Download JPG</button>
<button onclick="shareWA()">WhatsApp</button>

</div>

</div>

</div>

</div>


<div class="modal" id="modal">

<div class="modal-content">

<span class="close" onclick="closeModal()">✖</span>

<div id="mobileMessage"></div>

</div>

</div>


<audio id="music">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_2b1d8e7a59.mp3?filename=success-fanfare-trumpets-6185.mp3">
</audio>


<script>

let finalMessage="";


function rand(arr){
return arr[Math.floor(Math.random()*arr.length)]
}


function generate(){

let name=document.getElementById("name").value
let role=document.getElementById("role").value

if(!name || !role){

alert("First introduce the queen 👑")

return

}


/* message pools */

const royalIntro=[

"All hail the mighty",
"Make way for the legendary",
"Trumpets please for",
"Breaking news from the kingdom:",
"Ladies and gentlemen, bow before"

]

const titles=[

`Queen ${name}, the first of her name`,
`${name}, ruler of the realm`,
`${name}, destroyer of stereotypes`,
`${name}, the unstoppable`,
`${name}, breaker of ceilings`

]

const professions=[

`Supreme Commander of ${role}s`,
`Grandmaster of the ${role} arts`,
`The most feared ${role} in the land`,
`Protector of the sacred profession of ${role}`,
`The legendary ${role} everyone talks about`

]

const praise=[

"She works harder than the WiFi during IPL finals.",
"She multitasks so well even Google Calendar feels insecure.",
"Rumour has it productivity increases by 300% in her presence.",
"Historians are already preparing a documentary.",
"Some say the universe upgraded itself after she arrived."

]

const endings=[

"May her coffee stay strong and her haters stay confused.",
"The world runs on electricity and women like her.",
"History books are probably being updated as we speak.",
"The patriarchy is respectfully asked to move aside.",
"May her empire grow and her crown never tilt."

]


let msg=`

👑 ${rand(royalIntro)} ${rand(titles)}!

🏰 Known across the kingdom as ${rand(professions)}.

✨ Legend says: ${rand(praise)}

🌸 On this glorious Women's Day we celebrate brilliance, courage and unstoppable energy.

📜 Royal blessing: ${rand(endings)}

Happy Women's Day!
`

finalMessage=msg

document.getElementById("card").style.display="block"
document.getElementById("message").innerText=msg


/* mobile popup */

if(window.innerWidth<768){

document.getElementById("modal").style.display="flex"
document.getElementById("mobileMessage").innerText=msg

}

/* play music */

document.getElementById("music").play()

}


/* copy */

function copyMsg(){

navigator.clipboard.writeText(finalMessage)
alert("Copied!")

}


/* download screenshot */

function downloadCard(){

html2canvas(document.getElementById("card")).then(canvas=>{

let link=document.createElement("a")

link.download="queens-message.jpg"

link.href=canvas.toDataURL()

link.click()

})

}


/* whatsapp */

function shareWA(){

let url="https://wa.me/?text="+encodeURIComponent(finalMessage)

window.open(url)

}


function closeModal(){

document.getElementById("modal").style.display="none"

}

</script>

</body>
</html>
